receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  debug:
    verbosity: detailed
  
  # --- NUEVO: Exportador para Jaeger ---
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # -------------------------------------

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      # --- MODIFICADO: Añadimos Jaeger a los exportadores de trazas ---
      exporters: [debug, otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug] # Las métricas se quedan solo en debug, Jaeger es solo para Trazas
