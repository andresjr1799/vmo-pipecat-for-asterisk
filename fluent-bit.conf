[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# Para entornos con Docker, FluentBit lee los logs de stdout de los contenedores
# via el driver de logging de Docker. Alternativa: usar tail sobre archivos.
# Este input queda como placeholder para configuracion futura.

[OUTPUT]
    Name         stdout
    Match        *
    Format       json_lines
